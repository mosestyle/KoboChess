<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KoboChess</title>
  <style>
    :root{
      --bg:#f4f4f4;
      --fg:#111;
      --light:#e8e8e8;
      --dark:#bdbdbd;
      --border:#222;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--fg);
      display:flex;
      justify-content:center;
      padding:12px;
    }
    .wrap{
      width:min(100%,700px);
    }
    h1{
      margin:0 0 10px;
      font-size:28px;
      text-align:center;
    }
    .topbar,.actions{
      display:grid;
      gap:8px;
      margin-bottom:10px;
    }
    .topbar{
      grid-template-columns:1fr 1fr;
    }
    .actions{
      grid-template-columns:1fr 1fr 1fr;
    }
    button,select{
      width:100%;
      min-height:48px;
      font-size:18px;
      border:2px solid var(--border);
      border-radius:8px;
      background:#fff;
      color:#000;
    }
    .status{
      border:2px solid var(--border);
      background:#fff;
      border-radius:8px;
      padding:10px;
      min-height:54px;
      font-size:18px;
      margin-bottom:10px;
    }
    .board{
      display:grid;
      grid-template-columns:repeat(8,1fr);
      border:3px solid var(--border);
      width:100%;
      aspect-ratio:1/1;
      background:#000;
    }
    .sq{
      border:none;
      margin:0;
      padding:0;
      font-size:min(7vw,42px);
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      -webkit-user-select:none;
    }
    .light{background:var(--light)}
    .dark{background:var(--dark)}
    .selected{
      outline:4px solid #000;
      outline-offset:-4px;
    }
    .hint{
      box-shadow:inset 0 0 0 4px #444;
    }
    .legal{
      box-shadow:inset 0 0 0 4px #777;
    }
    .small{
      font-size:15px;
      line-height:1.35;
      margin-top:10px;
      opacity:.85;
    }
    .footer{
      margin-top:10px;
      font-size:14px;
      text-align:center;
      opacity:.8;
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>KoboChess</h1>

  <div class="topbar">
    <select id="difficulty">
      <option value="1">Difficulty 1</option>
      <option value="2">Difficulty 2</option>
      <option value="3">Difficulty 3</option>
      <option value="4">Difficulty 4</option>
      <option value="5" selected>Difficulty 5</option>
      <option value="6">Difficulty 6</option>
      <option value="7">Difficulty 7</option>
      <option value="8">Difficulty 8</option>
      <option value="9">Difficulty 9</option>
    </select>
    <select id="sideSelect">
      <option value="w" selected>Play as White</option>
      <option value="b">Play as Black</option>
    </select>
  </div>

  <div class="actions">
    <button id="newGameBtn">New Game</button>
    <button id="undoBtn">Undo</button>
    <button id="hintBtn">Hint</button>
  </div>

  <div id="status" class="status">Loading...</div>
  <div id="board" class="board"></div>

  <div class="small">
    Tap a piece, then tap where you want it to go. Promotion is auto-queen for now.<br>
    Your game auto-saves.
  </div>
  <div class="footer">Kobo Clara BW test version</div>
</div>

<script src="lib/chess.min.js"></script>
<script>
(function () {
  var boardEl = document.getElementById("board");
  var statusEl = document.getElementById("status");
  var undoBtn = document.getElementById("undoBtn");
  var hintBtn = document.getElementById("hintBtn");
  var newGameBtn = document.getElementById("newGameBtn");
  var difficultyEl = document.getElementById("difficulty");
  var sideSelectEl = document.getElementById("sideSelect");

  var PIECES = {
    wp:"♙", wn:"♘", wb:"♗", wr:"♖", wq:"♕", wk:"♔",
    bp:"♟", bn:"♞", bb:"♝", br:"♜", bq:"♛", bk:"♚"
  };

  var FILES = ["a","b","c","d","e","f","g","h"];

  var game = new Chess();
  var selected = null;
  var legalTargets = [];
  var hintSquares = [];
  var flipped = false;
  var playerColor = "w";
  var engineBusy = false;
  var pendingMode = null;
  var engine = null;

  function botColor() {
    return playerColor === "w" ? "b" : "w";
  }

  function difficultyMap(level) {
    var map = {
      1:{skill:0,time:80},
      2:{skill:2,time:120},
      3:{skill:4,time:180},
      4:{skill:6,time:250},
      5:{skill:8,time:350},
      6:{skill:10,time:500},
      7:{skill:12,time:700},
      8:{skill:15,time:1000},
      9:{skill:18,time:1500}
    };
    return map[level] || map[5];
  }

  function saveState() {
    var data = {
      moves: game.history(),
      playerColor: playerColor,
      difficulty: difficultyEl.value
    };
    localStorage.setItem("koboChessState", JSON.stringify(data));
  }

  function loadState() {
    try {
      var raw = localStorage.getItem("koboChessState");
      if (!raw) return false;

      var data = JSON.parse(raw);

      playerColor = data.playerColor || "w";
      sideSelectEl.value = playerColor;
      difficultyEl.value = data.difficulty || "5";

      game = new Chess();
      var moves = data.moves || [];
      for (var i = 0; i < moves.length; i++) {
        game.move(moves[i]);
      }

      selected = null;
      legalTargets = [];
      hintSquares = [];
      engineBusy = false;
      pendingMode = null;
      flipped = playerColor === "b";

      renderBoard();
      updateStatus();
      return true;
    } catch (err) {
      console.log(err);
      return false;
    }
  }

  function squareColor(fileIndex, rankIndex) {
    return ((fileIndex + rankIndex) % 2 === 0) ? "light" : "dark";
  }

  function getOrderedRanks() {
    return flipped ? [1,2,3,4,5,6,7,8] : [8,7,6,5,4,3,2,1];
  }

  function getOrderedFiles() {
    if (!flipped) return FILES.slice(0);
    return FILES.slice(0).reverse();
  }

  function pieceAt(square) {
    var piece = game.get(square);
    if (!piece) return "";
    return PIECES[piece.color + piece.type] || "";
  }

  function renderBoard() {
    boardEl.innerHTML = "";
    var files = getOrderedFiles();
    var ranks = getOrderedRanks();

    for (var r = 0; r < ranks.length; r++) {
      for (var f = 0; f < files.length; f++) {
        var square = files[f] + ranks[r];
        var btn = document.createElement("button");
        btn.className = "sq " + squareColor(f, r);

        if (selected === square) btn.className += " selected";
        if (legalTargets.indexOf(square) !== -1) btn.className += " legal";
        if (hintSquares.indexOf(square) !== -1) btn.className += " hint";

        btn.setAttribute("data-square", square);
        btn.textContent = pieceAt(square);
        btn.addEventListener("click", onSquareClick);
        boardEl.appendChild(btn);
      }
    }
  }

  function updateStatus(extra) {
    if (extra) {
      statusEl.textContent = extra;
      return;
    }

    if (typeof game.in_checkmate === "function" && game.in_checkmate()) {
      statusEl.textContent = "Checkmate. " + (game.turn() === "w" ? "Black" : "White") + " wins.";
      return;
    }

    if (typeof game.in_draw === "function" && game.in_draw()) {
      statusEl.textContent = "Draw.";
      return;
    }

    if (engineBusy && pendingMode === "move") {
      statusEl.textContent = "Bot is thinking...";
      return;
    }

    if (game.turn() === playerColor) {
      statusEl.textContent = "Your move (" + (playerColor === "w" ? "White" : "Black") + ")." +
        ((typeof game.in_check === "function" && game.in_check()) ? " Check." : "");
    } else {
      statusEl.textContent = "Bot to move." +
        ((typeof game.in_check === "function" && game.in_check()) ? " Check." : "");
    }
  }

  function requestEngineMove() {
    if (!engine) {
      updateStatus("Engine failed to load.");
      return;
    }

    engineBusy = true;
    pendingMode = "move";

    var cfg = difficultyMap(Number(difficultyEl.value));
    engine.postMessage("setoption name Skill Level value " + cfg.skill);
    engine.postMessage("position fen " + game.fen());
    engine.postMessage("go movetime " + cfg.time);

    updateStatus("Bot is thinking...");
  }

  function requestHint() {
    if (engineBusy) return;
    if (typeof game.game_over === "function" && game.game_over()) return;
    if (game.turn() !== playerColor) return;
    if (!engine) {
      updateStatus("Engine failed to load.");
      return;
    }

    engineBusy = true;
    pendingMode = "hint";

    engine.postMessage("setoption name Skill Level value 20");
    engine.postMessage("position fen " + game.fen());
    engine.postMessage("go movetime 400");

    updateStatus("Finding best move...");
  }

  function onSquareClick(e) {
    if (engineBusy) return;
    if (game.turn() !== playerColor) return;

    var square = e.currentTarget.getAttribute("data-square");
    hintSquares = [];

    if (!selected) {
      var piece = game.get(square);
      if (!piece) return;
      if (piece.color !== playerColor) return;

      selected = square;
      var moves = game.moves({ square: square, verbose: true });
      legalTargets = [];
      for (var i = 0; i < moves.length; i++) {
        legalTargets.push(moves[i].to);
      }
      renderBoard();
      updateStatus("Selected " + square);
      return;
    }

    if (selected === square) {
      selected = null;
      legalTargets = [];
      renderBoard();
      updateStatus();
      return;
    }

    var move = game.move({
      from: selected,
      to: square,
      promotion: "q"
    });

    if (!move) {
      var piece2 = game.get(square);
      if (piece2 && piece2.color === playerColor) {
        selected = square;
        var moves2 = game.moves({ square: square, verbose: true });
        legalTargets = [];
        for (var j = 0; j < moves2.length; j++) {
          legalTargets.push(moves2[j].to);
        }
        renderBoard();
        updateStatus("Selected " + square);
      } else {
        selected = null;
        legalTargets = [];
        renderBoard();
        updateStatus("Illegal move");
      }
      return;
    }

    selected = null;
    legalTargets = [];
    renderBoard();
    updateStatus();
    saveState();

    if (!(typeof game.game_over === "function" && game.game_over()) && game.turn() === botColor()) {
      requestEngineMove();
    }
  }

  function startGame() {
    game = new Chess();
    selected = null;
    legalTargets = [];
    hintSquares = [];
    engineBusy = false;
    pendingMode = null;
    playerColor = sideSelectEl.value;
    flipped = playerColor === "b";

    if (engine) engine.postMessage("ucinewgame");

    renderBoard();
    updateStatus();
    saveState();

    if (playerColor === "b") {
      requestEngineMove();
    }
  }

  function initEngine() {
    try {
      engine = new Worker("engine/stockfish-18-lite-single.js");
    } catch (err) {
      console.log(err);
      engine = null;
    }

    if (!engine) {
      updateStatus("Engine failed to load.");
      return;
    }

    engine.onmessage = function (e) {
      var line = (typeof e.data === "string") ? e.data : "";
      console.log("ENGINE:", line);

      if (!line) return;

      if (line.indexOf("bestmove") === 0) {
        var parts = line.replace(/\s+/g, " ").split(" ");
        var move = parts[1];

        if (!move || move === "(none)") {
          engineBusy = false;
          pendingMode = null;
          updateStatus();
          return;
        }

        var from = move.slice(0,2);
        var to = move.slice(2,4);

        if (pendingMode === "hint") {
          hintSquares = [from, to];
          engineBusy = false;
          pendingMode = null;
          renderBoard();
          updateStatus("Hint: " + from + " → " + to);
          return;
        }

        if (pendingMode === "move") {
          game.move({ from: from, to: to, promotion: "q" });
          engineBusy = false;
          pendingMode = null;
          hintSquares = [];
          renderBoard();
          updateStatus();
          saveState();
        }
      }
    };

    engine.onerror = function (err) {
      console.log("ENGINE ERROR:", err);
      engineBusy = false;
      pendingMode = null;
      updateStatus("Engine error.");
    };

    engine.postMessage("uci");
    engine.postMessage("isready");
    engine.postMessage("ucinewgame");
  }

  undoBtn.addEventListener("click", function () {
    if (engineBusy) return;

    var moveCount = game.history().length;
    if (moveCount >= 2) {
      game.undo();
      game.undo();
    } else if (moveCount === 1) {
      game.undo();
    }

    selected = null;
    legalTargets = [];
    hintSquares = [];
    renderBoard();
    updateStatus();
    saveState();
  });

  hintBtn.addEventListener("click", function () {
    selected = null;
    legalTargets = [];
    renderBoard();
    requestHint();
  });

  newGameBtn.addEventListener("click", startGame);
  sideSelectEl.addEventListener("change", startGame);

  initEngine();

  if (!loadState()) {
    startGame();
  }
})();
</script>
</body>
</html>
